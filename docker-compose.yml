services:
  washbot:
    build: .
    container_name: washbot
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - "com.project=washbot"
      - "traefik.enable=true"
      - "traefik.http.routers.washbot.rule=Host(`washbot.idea8.cloud`)"
      - "traefik.http.routers.washbot.entrypoints=websecure"
      - "traefik.http.routers.washbot.tls.certresolver=letsencrypt"
      - "traefik.http.services.washbot.loadbalancer.server.port=3000"
      - "traefik.http.routers.washbot.middlewares=security-headers"
    volumes:
      - whatsapp-session:/app/.wwebjs_auth
      - ./google_calendar_credentials.json:/app/google_calendar_credentials.json:ro
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whatsapp-session:

networks:
  traefik-net:
    external: true
